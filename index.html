<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Web Preview v0.4</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

canvas {
    display: block;
    touch-action: none;
}

#ui {
    position: absolute;
    top: 18px;
    left: 18px;
    z-index: 10;

    background: rgba(0,0,0,0.34);
    border: 1px solid rgba(255,255,255,0.08);

    padding: 14px 18px;
    border-radius: 18px;

    backdrop-filter: blur(12px);
}

.title {
    font-size: 20px;
    margin-bottom: 8px;
}

.info {
    opacity: 0.82;
    margin-top: 4px;
}

.seed {
    color: #8fb8ff;
}

.year {
    color: #ffd7a3;
}

.status {
    color: #b8ffd6;
}
</style>
</head>
<body>

<div id="ui">
    <div class="title">Galaxy Web Preview v0.4</div>
    <div class="info seed">Seed: 882341</div>
    <div class="info" id="starCount"></div>
    <div class="info year" id="yearText"></div>
    <div class="info status">Status: Stellar Ocean Drift</div>
</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

let zoom = 1;
let year = 12000000;

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    if (e.deltaY < 0) {
        zoom *= 1.08;
    } else {
        zoom *= 0.92;
    }

    zoom = Math.max(0.12, Math.min(zoom, 8));

}, { passive: false });

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

const stars = [];
const nebulae = [];
const dust = [];
const farStars = [];

const STAR_COUNT = 32000;
const ARM_COUNT = 4;

function createBackgroundStars() {

    for (let i = 0; i < 3000; i++) {

        farStars.push({

            x: rand(-5000, 5000),
            y: rand(-5000, 5000),

            size: rand(0.3, 1.5),

            alpha: rand(0.1, 0.8)
        });
    }
}

function createNebulae() {

    for (let i = 0; i < 20; i++) {

        nebulae.push({

            x: rand(-1200, 1200),
            y: rand(-1200, 1200),

            radius: rand(220, 520),

            driftX: rand(-0.03, 0.03),
            driftY: rand(-0.03, 0.03),

            color:
                Math.random() > 0.5
                ? "120,140,255"
                : "180,120,255"
        });
    }
}

function createDust() {

    for (let i = 0; i < 2500; i++) {

        dust.push({

            x: rand(-3000, 3000),
            y: rand(-3000, 3000),

            size: rand(0.2, 1.5),

            alpha: rand(0.02, 0.18),

            speed: rand(0.01, 0.08)
        });
    }
}

function createGalaxy() {

    // core
    for (let i = 0; i < 9000; i++) {

        const angle = rand(0, Math.PI * 2);

        const radius =
            Math.pow(Math.random(), 0.58) * 140;

        stars.push({

            orbitalRadius: radius,
            orbitalAngle: angle,

            orbitalSpeed:
                0.0025 /
                Math.max(radius * 0.025, 1),

            size: rand(0.5, 2.8),

            brightness: rand(0.5, 1),

            pulse: rand(0, Math.PI * 2),

            type: "core"
        });
    }

    // spiral arms
    for (let arm = 0; arm < ARM_COUNT; arm++) {

        const armOffset =
            (Math.PI * 2 / ARM_COUNT) * arm;

        for (let i = 0; i < STAR_COUNT; i++) {

            const t =
                i / STAR_COUNT * 14 * Math.PI;

            const radius = 24 * t;

            const spiral =
                t * 0.34 + armOffset;

            const spread =
                rand(-20, 20);

            if (Math.random() < 0.12) continue;

            stars.push({

                orbitalRadius:
                    radius + spread,

                orbitalAngle:
                    spiral,

                orbitalSpeed:
                    0.004 /
                    Math.max(radius * 0.03, 1),

                size:
                    rand(0.2, 1.9),

                brightness:
                    rand(0.2, 1),

                pulse:
                    rand(0, Math.PI * 2),

                type:
                    radius < 300
                    ? "young"
                    : "outer"
            });
        }
    }
}

createBackgroundStars();
createNebulae();
createDust();
createGalaxy();

document.getElementById("starCount").innerText =
    "Stars: " + stars.length.toLocaleString();

function starColor(star, pulse) {

    if (star.type === "core") {
        return `rgba(255,220,190,${pulse})`;
    }

    if (star.type === "young") {
        return `rgba(180,210,255,${pulse})`;
    }

    return `rgba(220,230,255,${pulse * 0.7})`;
}

let cameraTime = 0;

function drawFarStars(cx, cy) {

    for (const s of farStars) {

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,255,255,${s.alpha})`;

        ctx.arc(
            cx + s.x * 0.03,
            cy + s.y * 0.03,
            s.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

function drawNebulae(cx, cy) {

    for (const n of nebulae) {

        n.x += n.driftX;
        n.y += n.driftY;

        const gradient =
            ctx.createRadialGradient(

            cx + n.x * zoom,
            cy + n.y * zoom,
            0,

            cx + n.x * zoom,
            cy + n.y * zoom,
            n.radius * zoom
        );

        gradient.addColorStop(
            0,
            `rgba(${n.color},0.05)`
        );

        gradient.addColorStop(
            1,
            `rgba(${n.color},0)`
        );

        ctx.fillStyle = gradient;

        ctx.beginPath();

        ctx.arc(
            cx + n.x * zoom,
            cy + n.y * zoom,
            n.radius * zoom,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

function drawDust(cx, cy) {

    for (const d of dust) {

        d.x += d.speed;

        if (d.x > 3000) {
            d.x = -3000;
        }

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,255,255,${d.alpha})`;

        ctx.arc(
            cx + d.x * 0.15,
            cy + d.y * 0.15,
            d.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

function draw() {

    // trail fade
    ctx.fillStyle = "rgba(0,0,0,0.06)";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    cameraTime += 0.0025;

    const cameraX =
        Math.sin(cameraTime * 0.8) * 60;

    const cameraY =
        Math.cos(cameraTime * 0.5) * 42;

    const cx =
        canvas.width / 2 + cameraX;

    const cy =
        canvas.height / 2 + cameraY;

    drawFarStars(cx, cy);
    drawNebulae(cx, cy);
    drawDust(cx, cy);

    for (const star of stars) {

        star.orbitalAngle +=
            star.orbitalSpeed;

        const rx =
            Math.cos(star.orbitalAngle)
            * star.orbitalRadius;

        const ry =
            Math.sin(star.orbitalAngle)
            * star.orbitalRadius;

        const sx =
            cx + rx * zoom;

        const sy =
            cy + ry * zoom;

        if (
            sx < -100 ||
            sx > canvas.width + 100 ||
            sy < -100 ||
            sy > canvas.height + 100
        ) continue;

        const pulse =
            star.brightness *
            (0.72 + Math.sin(
                performance.now() * 0.0015
                + star.pulse
            ) * 0.28);

        const size =
            star.size * zoom *
            (0.95 + pulse * 0.15);

        // glow
        ctx.beginPath();

        ctx.fillStyle =
            starColor(star, pulse * 0.12);

        ctx.arc(
            sx,
            sy,
            size * 2.8,
            0,
            Math.PI * 2
        );

        ctx.fill();

        // star
        ctx.beginPath();

        ctx.fillStyle =
            starColor(star, pulse);

        ctx.arc(
            sx,
            sy,
            size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }

    // core pulse
    const pulse =
        80 +
        Math.sin(
            performance.now() * 0.001
        ) * 18;

    const gradient =
        ctx.createRadialGradient(
            cx,
            cy,
            0,
            cx,
            cy,
            pulse * zoom
        );

    gradient.addColorStop(
        0,
        "rgba(255,220,180,0.08)"
    );

    gradient.addColorStop(
        1,
        "rgba(255,220,180,0)"
    );

    ctx.fillStyle = gradient;

    ctx.beginPath();

    ctx.arc(
        cx,
        cy,
        pulse * zoom,
        0,
        Math.PI * 2
    );

    ctx.fill();

    year += 320;

    document.getElementById("yearText").innerText =
        "Year: " +
        Math.floor(year).toLocaleString();

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
