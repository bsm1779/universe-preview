<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Web Preview v0.3</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

canvas {
    display: block;
    touch-action: none;
}

#ui {
    position: absolute;
    top: 18px;
    left: 18px;
    z-index: 10;

    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.08);

    padding: 14px 18px;
    border-radius: 16px;

    backdrop-filter: blur(10px);
}

.title {
    font-size: 20px;
    margin-bottom: 8px;
}

.info {
    opacity: 0.82;
    margin-top: 4px;
}

.seed {
    color: #8fb8ff;
}

.year {
    color: #ffd7a3;
}

.life {
    color: #b9ffd2;
}
</style>
</head>
<body>

<div id="ui">
    <div class="title">Galaxy Web Preview v0.3</div>
    <div class="info seed">Seed: 882341</div>
    <div class="info" id="starCount"></div>
    <div class="info year" id="yearText"></div>
    <div class="info life">Status: Galactic Drift Active</div>
</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

let zoom = 1;
let year = 12000000;

const stars = [];
const dust = [];
const nebulae = [];

const STAR_COUNT = 26000;
const ARM_COUNT = 4;

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    if (e.deltaY < 0) {
        zoom *= 1.08;
    } else {
        zoom *= 0.92;
    }

    zoom = Math.max(0.12, Math.min(zoom, 8));

}, { passive: false });

function createNebulae() {

    for (let i = 0; i < 18; i++) {

        nebulae.push({

            x: rand(-1000, 1000),
            y: rand(-1000, 1000),

            radius: rand(180, 420),

            drift: rand(-0.02, 0.02),

            color:
                Math.random() > 0.5
                ? "120,140,255"
                : "180,120,255"
        });
    }
}

function createDust() {

    for (let i = 0; i < 1600; i++) {

        dust.push({

            x: rand(-2200, 2200),
            y: rand(-2200, 2200),

            size: rand(0.2, 1.4),

            alpha: rand(0.04, 0.22),

            driftX: rand(-0.02, 0.02),
            driftY: rand(-0.02, 0.02)
        });
    }
}

function createGalaxy() {

    // Core
    for (let i = 0; i < 7000; i++) {

        const angle = rand(0, Math.PI * 2);
        const radius = Math.pow(Math.random(), 0.55) * 120;

        stars.push({

            orbitalRadius: radius,
            orbitalAngle: angle,

            orbitalSpeed:
                0.0007 / Math.max(radius * 0.03, 1),

            size: rand(0.4, 2.5),

            brightness: rand(0.4, 1),

            pulse: rand(0, Math.PI * 2),

            type: "core"
        });
    }

    // Arms
    for (let arm = 0; arm < ARM_COUNT; arm++) {

        const armOffset =
            (Math.PI * 2 / ARM_COUNT) * arm;

        for (let i = 0; i < STAR_COUNT; i++) {

            const t =
                i / STAR_COUNT * 14 * Math.PI;

            const radius = 20 * t;

            const spiral =
                t * 0.28 + armOffset;

            const spread =
                rand(-18, 18);

            if (Math.random() < 0.1) continue;

            stars.push({

                orbitalRadius:
                    radius + spread,

                orbitalAngle:
                    spiral,

                orbitalSpeed:
                    0.001 /
                    Math.max(radius * 0.025, 1),

                size:
                    rand(0.25, 1.9),

                brightness:
                    rand(0.2, 1),

                pulse:
                    rand(0, Math.PI * 2),

                type:
                    radius < 260
                    ? "young"
                    : "outer"
            });
        }
    }
}

createNebulae();
createDust();
createGalaxy();

document.getElementById("starCount").innerText =
    "Stars: " + stars.length.toLocaleString();

function starColor(star, pulse) {

    if (star.type === "core") {
        return `rgba(255,220,190,${pulse})`;
    }

    if (star.type === "young") {
        return `rgba(180,210,255,${pulse})`;
    }

    return `rgba(220,230,255,${pulse * 0.8})`;
}

let cameraTime = 0;

function drawNebulae(cx, cy) {

    for (const n of nebulae) {

        n.x += n.drift;

        const gradient = ctx.createRadialGradient(
            cx + n.x * zoom,
            cy + n.y * zoom,
            0,
            cx + n.x * zoom,
            cy + n.y * zoom,
            n.radius * zoom
        );

        gradient.addColorStop(
            0,
            `rgba(${n.color},0.05)`
        );

        gradient.addColorStop(
            1,
            `rgba(${n.color},0)`
        );

        ctx.fillStyle = gradient;

        ctx.beginPath();

        ctx.arc(
            cx + n.x * zoom,
            cy + n.y * zoom,
            n.radius * zoom,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

function drawDust(cx, cy) {

    for (const d of dust) {

        d.x += d.driftX;
        d.y += d.driftY;

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(255,255,255,${d.alpha})`;

        ctx.arc(
            cx + d.x * zoom * 0.3,
            cy + d.y * zoom * 0.3,
            d.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

function draw() {

    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    cameraTime += 0.0015;

    const cameraX =
        Math.sin(cameraTime) * 40;

    const cameraY =
        Math.cos(cameraTime * 0.8) * 28;

    const cx =
        canvas.width / 2 + cameraX;

    const cy =
        canvas.height / 2 + cameraY;

    drawNebulae(cx, cy);
    drawDust(cx, cy);

    for (const star of stars) {

        star.orbitalAngle +=
            star.orbitalSpeed;

        const rx =
            Math.cos(star.orbitalAngle)
            * star.orbitalRadius;

        const ry =
            Math.sin(star.orbitalAngle)
            * star.orbitalRadius;

        const sx =
            cx + rx * zoom;

        const sy =
            cy + ry * zoom;

        if (
            sx < -50 ||
            sx > canvas.width + 50 ||
            sy < -50 ||
            sy > canvas.height + 50
        ) continue;

        const pulse =
            star.brightness *
            (0.75 + Math.sin(
                performance.now() * 0.001
                + star.pulse
            ) * 0.25);

        ctx.beginPath();

        ctx.fillStyle =
            starColor(star, pulse);

        const size =
            star.size * zoom *
            (0.92 + pulse * 0.12);

        ctx.arc(
            sx,
            sy,
            size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }

    year += 240;

    document.getElementById("yearText").innerText =
        "Year: " +
        Math.floor(year).toLocaleString();

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
